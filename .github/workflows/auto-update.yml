name: Update and publish to AUR

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      force_publish:
        description: "Force publish to AUR regardless of version"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    container: archlinux:latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Install dependencies
        run: pacman -Syu --noconfirm git jq curl pacman-contrib

      - uses: actions/checkout@v4

      - name: Check for new version
        id: check
        run: |
          OLD_VER=$(grep '^pkgver=' PKGBUILD | cut -d= -f2)
          LATEST_TAG=$(curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/AkaraChen/aghub/releases/latest" | jq -r '.tag_name')
          NEW_VER="${LATEST_TAG#v}"
          echo "old_ver=$OLD_VER" >> "$GITHUB_OUTPUT"
          echo "new_ver=$NEW_VER" >> "$GITHUB_OUTPUT"
          echo "Old: $OLD_VER -> New: $NEW_VER"
          if [ "$OLD_VER" != "$NEW_VER" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for upstream assets
        if: steps.check.outputs.changed == 'true'
        run: |
          NEW_VER=${{ steps.check.outputs.new_ver }}
          BASE_URL="https://github.com/AkaraChen/aghub/releases/download/v${NEW_VER}"
          for i in $(seq 1 12); do
            HTTP_CODE=$(curl -sL -o /dev/null -w "%{http_code}" "${BASE_URL}/aghub_${NEW_VER}_amd64.deb")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Assets ready."
              exit 0
            fi
            echo "Waiting for assets... attempt $i/12"
            sleep 300
          done
          echo "::error::Assets not available after 60 minutes"
          exit 1

      - name: Update PKGBUILD and .SRCINFO
        if: steps.check.outputs.changed == 'true'
        run: |
          NEW_VER=${{ steps.check.outputs.new_ver }}

          # Update pkgver and reset pkgrel
          sed -i "s/^pkgver=.*/pkgver=$NEW_VER/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          # makepkg refuses to run as root, create a build user
          useradd -m builduser
          chown -R builduser:builduser .
          git config --global --add safe.directory "*"

          # Update checksums and regenerate .SRCINFO
          su builduser -c "cd '$GITHUB_WORKSPACE' && updpkgsums"
          su builduser -c "cd '$GITHUB_WORKSPACE' && makepkg --printsrcinfo > .SRCINFO"

          # Commit to GitHub repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to v$NEW_VER"
          git push

  publish:
    needs: update
    if: needs.update.outputs.changed == 'true' || github.event.inputs.force_publish == 'true' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Check if AUR needs update
        id: aur_check
        run: |
          sudo apt-get update -qq && sudo apt-get install -qq -y jq > /dev/null
          PKG_VER=$(grep '^pkgver=' PKGBUILD | cut -d= -f2)
          PKG_REL=$(grep '^pkgrel=' PKGBUILD | cut -d= -f2)
          LOCAL_VER="${PKG_VER}-${PKG_REL}"
          AUR_VER=$(curl -sL "https://aur.archlinux.org/rpc/v5/info?arg[]=aghub-bin" | jq -r '.results[0].Version // empty')
          echo "local_ver=$LOCAL_VER"
          echo "aur_ver=$AUR_VER"
          if [ "$AUR_VER" != "$LOCAL_VER" ]; then
            echo "needs_publish=true" >> "$GITHUB_OUTPUT"
            echo "AUR ($AUR_VER) behind local ($LOCAL_VER), will publish"
          else
            echo "needs_publish=false" >> "$GITHUB_OUTPUT"
            echo "AUR ($AUR_VER) matches local ($LOCAL_VER), skipping"
          fi

      - name: Publish to AUR
        if: steps.aur_check.outputs.needs_publish == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: aghub-bin
          pkgbuild: ./PKGBUILD
          assets: aghub.desktop
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
